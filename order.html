<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Your Order</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:350px;
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#d35400;
        }

        p{
            font-size:18px;
            margin:12px 0;
        }

        input{
            width:100%;
            padding:10px;
            font-size:18px;
            margin-top:8px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#d35400;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#b84300;
        }

        #message{
            margin-top:20px;
            text-align:center;
            color:green;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Place Your Order</h2>

    <p><b>Food:</b> <span id="food"></span></p>

    <p><b>Price:</b> ₹<span id="price"></span></p>

    <label><b>Quantity</b></label>
    <input type="number" id="qty" value="1" min="1">

    <p><b>Total:</b> ₹<span id="total"></span></p>

    <button onclick="placeOrder()">Place Order</button>

    <p id="message"></p>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const food = params.get("food");
const price = Number(params.get("price"));

document.getElementById("food").innerHTML = food;
document.getElementById("price").innerHTML = price;

const qty = document.getElementById("qty");
const total = document.getElementById("total");

function calculateTotal(){
    total.innerHTML = price * qty.value;
}

qty.addEventListener("input", calculateTotal);

calculateTotal();

function placeOrder(){

    document.getElementById("message").innerHTML = "✅ Your " + qty.value + " " + food + " has been ordered successfully!!!";

}

</script>

</body>
</html>
